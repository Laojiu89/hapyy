name: Convert Rules to MRS

on:
  push:
    paths:
      - 'rules/rules.yaml'
    branches: [ main, master, meta ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码 (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装最新版 Mihomo 内核
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl
          
          # 获取最新版本下载地址
          MIHOMO_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | jq -r '.assets[] | select(.name | test("mihomo-linux-amd64.*\\.gz$")) | .browser_download_url' \
            | head -n 1)
          
          if [ -z "$MIHOMO_URL" ]; then
            echo "❌ 未找到 Mihomo 下载资源"
            exit 1
          fi
          
          echo "📥 正在下载: $MIHOMO_URL"
          curl -L -o mihomo.gz "$MIHOMO_URL"
          gzip -d mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo
          echo "✅ Mihomo 安装成功"

      - name: 将 YAML 转换为 MRS
        run: |
          # 防错机制：如果 rules.yaml 被删除了，直接安全退出，不阻塞也不报错红叉
          if [ ! -f "rules/rules.yaml" ]; then
            echo "⚠️ 提示：rules/rules.yaml 不存在（可能已被删除），跳过转换步骤。"
            exit 0
          fi

          mkdir -p ruleset
          mihomo convert-ruleset domain yaml rules/rules.yaml ruleset/rules.mrs
          echo "✅ 转换完成: ruleset/rules.mrs"
          ls -lh ruleset/rules.mrs

      - name: 提交并推送变更到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 检查生成的 mrs 文件是否存在，并判断是否有内容变化
          if [ -f "ruleset/rules.mrs" ] && git diff --quiet ruleset/rules.mrs; then
            echo "没有检测到 rules.mrs 的内容变化，跳过提交。"
          else
            # 防止文件不存在时 git add 报错
            git add ruleset/rules.mrs 2>/dev/null || true
            
            # 只有当暂存区确实有文件修改时才执行 commit
            if ! git diff --cached --quiet; then
              git commit -m "chore: 自动更新 rules.mrs [$(date +'%Y-%m-%d %H:%M')]"
              git push
              echo "✅ rules.mrs 已成功推送到仓库。"
            else
              echo "没有文件需要提交。"
            fi
          fi
